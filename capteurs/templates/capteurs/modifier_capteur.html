{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier le Capteur {{ capteur.id_capteur }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'capteurs/css/style.css' %}">
</head>
<body>

    <div class="container dashboard-container py-5" style="max-width: 600px;">

        <div class="mb-4">
            <a href="{% url 'index' %}" class="btn btn-outline-secondary btn-sm px-3 rounded-pill text-white">
                <i class="fa-solid fa-arrow-left me-2"></i> Annuler et retourner au Dashboard
            </a>
        </div>

        <div class="history-card p-4 shadow-lg">
            <div class="border-bottom border-secondary border-opacity-25 pb-3 mb-4">
                <h3 class="fw-bold text-white mb-1">
                    <i class="fa-solid fa-pen-to-square text-warning me-2"></i>
                    Configuration Capteur
                </h3>
                <p class="text-secondary mb-0">Modification du matériel matériel <code class="text-info">#{{ capteur.id_capteur }}</code></p>
            </div>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-4">
                    <label for="nom_capteur" class="form-label text-secondary small fw-bold">Nom d'usage du capteur</label>
                    <input type="text" class="form-control" id="nom_capteur" name="nom_capteur"
                           value="{{ capteur.nom }}" placeholder="Ex: Capteur Nord, DHT22-Séjour" required>
                </div>

                <div class="mb-4">
                    <label for="emplacement_capteur" class="form-label text-secondary small fw-bold">Assignation de la pièce (salle_nom dans l'URL)</label>
                    <input type="text" class="form-control" id="emplacement_capteur" name="emplacement_capteur"
                           value="{{ capteur.emplacement }}" placeholder="Ex: sejour, chambre1, cuisine" required>
                    <div class="form-text text-muted small mt-1">
                        <i class="fa-solid fa-circle-info me-1 text-info"></i> Attention à l'écriture (minuscules, pas d'espaces) pour que l'URL reste propre.
                    </div>
                </div>

                <div class="d-flex gap-2 mt-5">
                    <button type="submit" class="btn btn-warning text-dark fw-bold w-100 py-2">
                        <i class="fa-solid fa-floppy-disk me-2"></i> Enregistrer les modifications
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
